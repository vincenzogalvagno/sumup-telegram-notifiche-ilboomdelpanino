name: Controlla pagamenti SumUp

on:
  schedule:
    # Ogni 5 minuti, dalle 17:00 alle 03:00 ora italiana
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  controlla:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install requests

      - name: Controlla nuove transazioni
        env:
          SUMUP_API_KEY: ${{ secrets.SUMUP_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python sumup_telegram.py

      - name: Salva stato nel repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_transaction.json
          git diff --staged --quiet || git commit -m "aggiorna ultimo pagamento"
          git push
