name: Controlla pagamenti SumUp

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  controlla:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install requests

      - name: Ripristina stato precedente
        uses: actions/cache/restore@v4
        with:
          path: state
          key: sumup-state-${{ github.run_id }}
          restore-keys: |
            sumup-state-

      - name: Controlla nuove transazioni
        env:
          SUMUP_API_KEY: ${{ secrets.SUMUP_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python sumup_telegram.py

      - name: Salva stato aggiornato
        uses: actions/cache/save@v4
        if: always()
        with:
          path: state
          key: sumup-state-${{ github.run_id }}
